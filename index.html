<!DOCTYPE html>
<html>
<head>
    <title>ServiceNow Popup Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        iframe {
            width: 100%;
            height: 900px;
            border: 1px solid #ccc;
            display: none;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<h2>ServiceNow Login Test</h2>

<button onclick="loginToSnow()">
    Login to ServiceNow
</button>

<p id="status">
    Not logged in
</p>

<iframe id="snowFrame"></iframe>

<script>

const SNOW_URL =
    "https://abbaiagentspov.service-now.com";

function loginToSnow() {

    document.getElementById("status").innerText =
        "Waiting for popup to close...";

    const popup = window.open(
        SNOW_URL,
        "snowLogin",
        "width=1000,height=800"
    );

    const timer = setInterval(() => {

        if (popup.closed) {

            clearInterval(timer);

            document.getElementById("status").innerText =
                "Popup closed. Loading iframe...";

            const frame =
                document.getElementById("snowFrame");

            frame.src = SNOW_URL;

            frame.style.display = "block";
        }

    }, 1000);
}

</script>

</body>
</html>
