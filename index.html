<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ServiceNow Embed Test</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            margin-right: 10px;
        }
    </style>

    <script type="module">

        import {
            init,
            login,
            logout,
            getEmbeddables
        } from 'https://abbaiagentspov.service-now.com/uxasset/externals/sn_embeddable_core/index.jsdbx';

        window.currentToken = null;

        function getTokenCallBack() {
            return Promise.resolve(window.currentToken);
        }

        await init({
            theme: 'fad87d2ca304121029a4d1aed31e610f',
            baseURL: 'https://abbaiagentspov.service-now.com',
            authCallback: getTokenCallBack,
            module: '08dfb9c9879dcb1c1197670a0cbb3565',
            pageName: document.title
        });

        getEmbeddables([
            "sn-embedx-case-list"
        ]);

        window.loginSnow = async function () {

            const popup = window.open(
                'https://abbaiagentspov.service-now.com',
                'snowLogin',
                'width=700,height=800'
            );

            const timer = setInterval(async () => {

                if (popup.closed) {

                    clearInterval(timer);

                    console.log('Login popup closed');

                    try {

                        // Replace with actual token acquisition
                        window.currentToken = '';

                        await login();

                        document.getElementById('status').innerText =
                            'Login event sent to embeddable framework';

                    } catch (e) {

                        console.error(e);

                        document.getElementById('status').innerText =
                            'Login failed';
                    }
                }

            }, 1000);
        };

        window.logoutSnow = async function () {

            window.currentToken = null;

            await logout();

            document.getElementById('status').innerText =
                'Logged out';
        };

    </script>
</head>
<body>

    <h1>ServiceNow Embeddable Test</h1>

    <button onclick="loginSnow()">Login</button>

    <button onclick="logoutSnow()">Logout</button>

    <p id="status">Not logged in</p>

    <hr>

    <sn-embedx-case-list
        table="incident"
        limit="20"
        list-title="List of Cases"
        query="opened_byDYNAMIC90d1921e5f510100a9ad2572f2b477fe"
        columns="number,short_description,sys_updated_on,state">
    </sn-embedx-case-list>

</body>
</html>
