<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServiceNow Login</title>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        #toolbar {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }

        #snowFrame {
            flex: 1;
            width: 100%;
            border: none;
            display: none;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }

        #status {
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="toolbar">
        <button id="loginBtn">Login to ServiceNow</button>
        <span id="status"></span>
    </div>

    <iframe id="snowFrame"></iframe>
</div>

<script>
    const loginBtn = document.getElementById('loginBtn');
    const status = document.getElementById('status');
    const frame = document.getElementById('snowFrame');

    loginBtn.addEventListener('click', () => {

        const loginWindow = window.open(
            'https://abbaiagentspov.service-now.com',
            'snowLogin',
            'width=1200,height=800'
        );

        if (!loginWindow) {
            status.textContent = 'Popup blocked by browser.';
            return;
        }

        status.textContent =
            'Login in the popup window. Close it when finished.';

        const timer = setInterval(() => {

            if (loginWindow.closed) {
                clearInterval(timer);

                status.textContent =
                    'Popup closed. Loading ServiceNow...';

                frame.src =
                    'https://abbaiagentspov.service-now.com';

                frame.style.display = 'block';
            }

        }, 1000);
    });
</script>

</body>
</html>
